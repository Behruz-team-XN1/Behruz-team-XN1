<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Behruz-team-XN1</title>
  <link rel="stylesheet" href="./main.css">
</head>

<body>

  <header class="header">
    <div class="header-top-box">
      <div class="header-top-box-inner">
        <p class="header-top-box-text">
          A Webflow template for SaaS products. <a class="header-top-box-link" href="">See all templates ></a>
        </p>
      </div>
    </div>

    <div class="container">
      <div class="header-inner">

        <div class="header-box">
          <div class="header-logo">
            <p class="logo-text">Whirl</p>
          </div>

          <nav>

            <ul class="header-list">
              <li class="header-list-item">
                <a href="#" class="header-list-link">
                  Features
                </a>
              </li>
              <li class="header-list-item">
                <a href="#" class="header-list-link">
                  Pricing
                </a>
              </li>
              <li class="header-list-item">
                <a href="#" class="header-list-link">
                  Integrations
                </a>
              </li>
              <li class="header-list-item">
                <a href="#" class="header-list-link">
                  Learn
                </a>
              </li>
            </ul>

          </nav>

        </div>

        <div class="header-btns">
          <button class="header-btn">
            Sign-in
          </button>
          <button class="header-btn2">
            Book a demo
          </button>
        </div>

      </div>
    </div>
  </header>


  <section class="hero">
    <div class="container">
      <div class="hero-inner">
        <div class="hero-box">
          <h1 class="hero-title">
            Your everyday tasks, automated.
          </h1>
          <p class="hero-text">
            Whirl lets you design and streamline your everyday tasks and workflows in just a few clicks.
          </p>
          <div class="hero-btns">
            <button class="hero-btn">
              Book a demo
            </button>
            <button class="hero-btn2">
              Learn more >
            </button>
          </div>
        </div>
        <img class="hero-img" src="./images/hero-img.svg" alt="" width="452" height="422">
      </div>
    </div>
  </section>

</html>
